<!DOCTYPE html>
<html>
<head>
    <title>Link Detection</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
</head>
<body>

<div class="navbar">
    <div class="logo">FAKE DETECT</div>
    <div class="nav-links">
        <a href="/image">Image Detect</a>
        <a href="/video">Video Detect</a>
        <a href="/audio">Audio Detect</a>
        <a href="/link" class="active">Link Detect</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="detect-page">
    <div class="detect-wrapper">
        <div class="detect-left">
            <h1>Detect DeepFake From Link</h1>
            <p>Paste a video or social media link for AI-powered deepfake analysis.</p>
        </div>
        <div class="detect-right">
            <div class="upload-card">
                <form method="POST" action="/detect-link">
                    <div class="file-box">
                        <input type="text" name="video_url" placeholder="Paste video / reel link here" required>
                    </div>
                    <button class="btn" type="submit">Analyze Link</button>
                    <div class="helper">
                        Supported: Instagram / public video URLs
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
