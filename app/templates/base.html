<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Fake Detect{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- 🔷 NAVBAR (COMMON FOR ALL PAGES) -->
    <div class="navbar">

        <a href="/" class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="logo">
            <span>FAKE DETECT</span>
        </a>

        <div class="nav-links">
            <a href="/image" class="nav-link {% if request.path == '/image' %}active{% endif %}">Image Detect</a>
            <a href="/video" class="nav-link {% if request.path == '/video' %}active{% endif %}">Video Detect</a>
            <a href="/history" class="nav-link {% if request.path == '/history' %}active{% endif %}">History</a>
            <a href="/logout" class="nav-link">Logout</a>
        </div>

    </div>

    <!-- 🔷 PAGE CONTENT -->
    {% block content %}{% endblock %}

</body>
</html>
